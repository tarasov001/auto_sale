name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH key
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Add server to known_hosts
      run: |
        ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to VPS
      env:
        VPS_USER: ${{ secrets.VPS_USER }}
        VPS_HOST: ${{ secrets.VPS_HOST }}
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
      run: |
        # Копируем файлы на сервер
        scp -r .github/workflows/deploy-config.sh ${VPS_USER}@${VPS_HOST}:/tmp/deploy.sh
        scp docker-compose.prod.yml ${VPS_USER}@${VPS_HOST}:/tmp/docker-compose.prod.yml
        scp Dockerfile ${VPS_USER}@${VPS_HOST}:/tmp/Dockerfile
        scp requirements.txt ${VPS_USER}@${VPS_HOST}:/tmp/requirements.txt
        scp -r api ${VPS_USER}@${VPS_HOST}:/tmp/api
        scp -r config ${VPS_USER}@${VPS_HOST}:/tmp/config
        scp -r frontend ${VPS_USER}@${VPS_HOST}:/tmp/frontend
        scp manage.py ${VPS_USER}@${VPS_HOST}:/tmp/manage.py
        
        # Выполняем деплой на сервере
        ssh ${VPS_USER}@${VPS_HOST} "
          bash /tmp/deploy.sh '${SECRET_KEY}' '${DB_PASSWORD}' '${ALLOWED_HOSTS}'
        "
